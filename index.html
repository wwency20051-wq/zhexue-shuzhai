<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哲思书斋 · 与先贤对话</title>
<meta name="description" content="与33位先贤对话——你的随身中国哲学导师">
<meta name="theme-color" content="#0d0d0d">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
        --ink: #0d0d0d; --ink-light: #1a1817; --parchment: #2a2520;
        --parchment-light: #3a3330; --text-primary: #e8ddd0;
        --text-secondary: #a09080; --vermillion: #c23b22;
        --vermillion-glow: rgba(194,59,34,0.3); --gold: #c9a96e; --gold-dim: #8a7a5a;
    }
    body {
        font-family: "Noto Serif SC", "SimSun", "STSong", serif;
        background: var(--ink); color: var(--text-primary);
        height: 100vh; overflow: hidden;
        background-image:
            radial-gradient(ellipse at 20% 50%, rgba(194,59,34,0.05) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 50%, rgba(201,169,110,0.04) 0%, transparent 60%);
    }
    .btn {
        padding: 12px 48px; border: 1px solid var(--vermillion); border-radius: 4px;
        background: transparent; color: var(--vermillion);
        font-size: 0.95rem; font-family: inherit; letter-spacing: 4px;
        cursor: pointer; transition: all 0.3s;
    }
    .btn:hover { background: var(--vermillion); color: #fff; }
    .btn-small {
        padding: 6px 18px; border: 1px solid var(--vermillion); border-radius: 2px;
        background: transparent; color: var(--vermillion);
        font-size: 0.8rem; font-family: inherit; cursor: pointer; transition: all 0.3s;
    }
    .btn-small:hover { background: var(--vermillion); color: #fff; }
    .btn-gold { border-color: var(--gold); color: var(--gold); }
    .btn-gold:hover { background: var(--gold); color: #000; }

    /* 登录 */
    #login-page {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; padding: 20px;
        background: radial-gradient(ellipse at center, #1a1817 0%, var(--ink) 70%);
    }
    #login-page .logo { font-size: 4rem; margin-bottom: 10px; letter-spacing: 12px; opacity: 0.8; }
    #login-page h1 { font-size: 2rem; font-weight: 700; letter-spacing: 8px; color: var(--text-primary); margin-bottom: 6px; }
    #login-page .subtitle { color: var(--text-secondary); margin-bottom: 40px; font-size: 0.9rem; letter-spacing: 4px; }
    #login-page input {
        width: 380px; max-width: 85vw; padding: 14px 20px;
        border: 1px solid var(--parchment-light); border-radius: 4px;
        background: rgba(255,255,255,0.04); color: var(--text-primary);
        font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.3s;
    }
    #login-page input:focus { border-color: var(--vermillion); }
    #login-page input::placeholder { color: #555; font-style: italic; }
    #login-page .hint { color: #555; font-size: 0.75rem; margin-top: 12px; }

    /* 选择页 */
    #select-page {
        display: none; flex-direction: column; align-items: center;
        height: 100vh; padding: 20px; overflow-y: auto;
    }
    #select-page .select-title {
        font-size: 1.2rem; letter-spacing: 6px; color: var(--text-secondary);
        margin: 30px 0 8px;
    }
    .select-title::before, .select-title::after { content: '——'; color: var(--gold-dim); margin: 0 12px; }
    .select-subtitle { color: #555; font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 30px; }
    .philosopher-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding-bottom: 60px; }
    .ph-card {
        width: 170px; padding: 28px 16px 22px; border-radius: 4px;
        background: var(--ink-light); cursor: pointer; transition: all 0.35s;
        text-align: center; border: 1px solid transparent; position: relative;
    }
    .ph-card:hover {
        transform: translateY(-6px); border-color: var(--ph-color, var(--vermillion));
        box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        background: linear-gradient(135deg, var(--ink-light) 0%, var(--parchment) 100%);
    }
    .ph-card .ph-char { font-size: 3rem; font-weight: 900; margin-bottom: 12px; }
    .ph-card .name { font-size: 1.1rem; font-weight: 700; margin-bottom: 3px; }
    .ph-card .title { font-size: 0.75rem; color: var(--text-secondary); }
    .ph-card .era { font-size: 0.7rem; color: #555; margin-top: 6px; }
    .course-badge {
        position: absolute; top: 8px; right: 8px;
        font-size: 0.55rem; padding: 2px 6px; border-radius: 2px;
    }
    .course-badge.中哲 { background: rgba(139,69,19,0.2); color: #c9a96e; border: 1px solid rgba(139,69,19,0.3); }
    .course-badge.西哲 { background: rgba(58,74,107,0.2); color: #8a9abd; border: 1px solid rgba(58,74,107,0.3); }
    .course-badge.马哲 { background: rgba(139,32,32,0.2); color: #e06060; border: 1px solid rgba(139,32,32,0.3); }

    /* 复习页 */
    #review-page {
        display: none; flex-direction: column; height: 100vh; overflow-y: auto;
    }
    .review-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 20px 30px; background: var(--ink-light);
        border-bottom: 1px solid var(--parchment-light); flex-shrink: 0;
    }
    .review-header h2 { font-size: 1.2rem; letter-spacing: 4px; }
    .review-header .sub { color: var(--text-secondary); font-size: 0.8rem; letter-spacing: 2px; }
    .review-stats {
        display: flex; gap: 24px; padding: 20px 30px;
        background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--parchment-light);
    }
    .stat-item { text-align: center; }
    .stat-item .num { font-size: 1.6rem; font-weight: 700; color: var(--gold); }
    .stat-item .label { font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 1px; }
    .review-list {
        flex: 1; padding: 20px 30px; display: flex; flex-direction: column; gap: 10px;
    }
    .review-list-title { font-size: 0.9rem; color: var(--text-secondary); letter-spacing: 2px; margin-bottom: 10px; }
    .review-empty { text-align: center; color: #555; padding: 60px 20px; font-size: 0.9rem; letter-spacing: 2px; }
    .review-empty .big { font-size: 3rem; margin-bottom: 12px; opacity: 0.3; }
    .review-item {
        display: flex; align-items: center; gap: 16px;
        padding: 16px 20px; background: var(--ink-light);
        border: 1px solid var(--parchment-light); border-radius: 4px;
        transition: all 0.3s;
    }
    .review-item:hover { border-color: var(--gold-dim); background: linear-gradient(135deg, var(--ink-light), var(--parchment)); }
    .review-item .ri-icon { font-size: 1.8rem; width: 40px; text-align: center; }
    .review-item .ri-info { flex: 1; }
    .review-item .ri-name { font-weight: 600; font-size: 0.95rem; }
    .review-item .ri-meta { font-size: 0.72rem; color: var(--text-secondary); margin-top: 2px; }
    .stage-bar { display: flex; gap: 3px; margin-top: 4px; }
    .stage-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--parchment-light); }
    .stage-dot.active { background: var(--gold); }

    /* 聊天页 */
    #chat-page { display: none; height: 100vh; }
    .chat-layout { display: flex; height: 100vh; }
    .portrait-panel {
        width: 30%; min-width: 220px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: linear-gradient(180deg, var(--ink-light) 0%, var(--ink) 100%);
        border-right: 1px solid var(--parchment-light);
        padding: 30px 20px; position: relative; overflow: hidden;
    }
    .portrait-panel::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(ellipse at 50% 30%, var(--vermillion-glow) 0%, transparent 60%);
        pointer-events: none;
    }
    .portrait-frame {
        position: relative; z-index: 1;
        width: 160px; height: 160px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        border: 2px solid var(--gold-dim);
        background: rgba(255,255,255,0.03); margin-bottom: 24px;
        transition: box-shadow 0.5s; overflow: hidden;
    }
    .portrait-frame.speaking { box-shadow: 0 0 40px var(--vermillion-glow); border-color: var(--vermillion); }
    .portrait-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .portrait-frame .ph-char { font-size: 3.5rem; font-weight: 900; text-shadow: 0 0 40px rgba(255,255,255,0.1); }
    .portrait-name { font-size: 1.4rem; font-weight: 700; z-index: 1; margin-bottom: 4px; }
    .portrait-title { font-size: 0.8rem; color: var(--text-secondary); z-index: 1; margin-bottom: 2px; }
    .portrait-era { font-size: 0.72rem; color: #665; z-index: 1; }
    .review-badge { z-index: 1; margin-top: 12px; padding: 4px 14px; background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.3); border-radius: 2px; font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; }
    .portrait-panel .deco-line { position: absolute; right: 15px; top: 10%; bottom: 10%; width: 1px; background: linear-gradient(180deg, transparent, var(--gold-dim), transparent); opacity: 0.3; }

    .chat-panel { flex: 1; display: flex; flex-direction: column; background: var(--ink); }
    #chat-header {
        display: flex; align-items: center; padding: 14px 20px;
        background: var(--ink-light); border-bottom: 1px solid var(--parchment-light);
        gap: 10px; flex-shrink: 0;
    }
    #chat-header .back-btn { cursor: pointer; font-size: 1rem; color: var(--text-secondary); padding: 4px 8px; border-radius: 4px; transition: background 0.2s; }
    #chat-header .back-btn:hover { background: var(--parchment); }
    #chat-header .ph-mini-info { display: flex; align-items: center; gap: 8px; flex: 1; }
    #chat-header .ph-mini-info .mini-char { font-size: 1.2rem; font-weight: 700; }
    #chat-header .ph-mini-info .mini-name { font-size: 0.9rem; font-weight: 600; }
    .mode-badge { font-size: 0.65rem; padding: 3px 10px; border-radius: 2px; letter-spacing: 1px; }
    .mode-badge.review { background: rgba(201,169,110,0.15); color: var(--gold); border: 1px solid rgba(201,169,110,0.3); }
    .mode-badge.free { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
    .auto-speak-label { font-size: 0.72rem; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .auto-speak-label input { accent-color: var(--vermillion); }

    #messages {
        flex: 1; overflow-y: auto; padding: 20px;
        display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--parchment-light); border-radius: 2px; }
    .msg { max-width: 80%; padding: 12px 18px; line-height: 1.7; font-size: 0.9rem; animation: fadeIn 0.3s ease-out; }
    .msg.user { align-self: flex-end; background: rgba(194,59,34,0.12); border: 1px solid rgba(194,59,34,0.2); border-radius: 4px; }
    .msg.bot { align-self: flex-start; background: rgba(255,255,255,0.03); border-left: 3px solid var(--ph-color, var(--gold)); border-radius: 2px; }
    .msg.system { align-self: center; background: transparent; color: var(--text-secondary); font-size: 0.75rem; padding: 4px 10px; letter-spacing: 2px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .speak-btn { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border: none; border-radius: 50%; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 0.75rem; margin-left: 6px; transition: all 0.2s; vertical-align: middle; }
    .speak-btn:hover { background: var(--parchment-light); color: var(--text-primary); }
    .speak-btn.speaking { background: var(--vermillion); color: #fff; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
    .typing-indicator { align-self: flex-start; display: flex; gap: 4px; padding: 12px 18px; border-left: 3px solid var(--ph-color, var(--gold)); background: rgba(255,255,255,0.02); }
    .typing-indicator span { width: 5px; height: 5px; background: var(--text-secondary); border-radius: 50%; animation: bounce 1.4s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
    .error-msg { align-self: center; background: rgba(194,59,34,0.1); color: var(--vermillion); padding: 8px 16px; border-radius: 4px; font-size: 0.8rem; }

    #input-area { display: flex; gap: 8px; padding: 14px 20px; background: var(--ink-light); border-top: 1px solid var(--parchment-light); flex-shrink: 0; }
    #input-area input { flex: 1; padding: 10px 16px; border: 1px solid var(--parchment-light); border-radius: 2px; background: rgba(255,255,255,0.03); color: var(--text-primary); font-size: 0.85rem; font-family: inherit; outline: none; }
    #input-area input:focus { border-color: var(--vermillion); }
    #input-area input::placeholder { color: #555; font-style: italic; }
    #input-area .send-btn { width: 38px; height: 38px; border: 1px solid var(--vermillion); border-radius: 2px; background: transparent; color: var(--vermillion); font-size: 0.9rem; cursor: pointer; transition: all 0.25s; flex-shrink: 0; }
    #input-area .send-btn:hover { background: var(--vermillion); color: #fff; }
    #input-area .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #input-area .mic-btn {
        width: 38px; height: 38px; min-width: 38px;
        border: 1px solid var(--gold-dim); border-radius: 2px;
        background: transparent; color: var(--text-secondary);
        font-size: 1rem; cursor: pointer; transition: all 0.25s;
        flex-shrink: 0; position: relative;
    }
    #input-area .mic-btn:hover { border-color: var(--gold); color: var(--gold); }
    #input-area .mic-btn.recording { border-color: var(--vermillion); color: var(--vermillion); background: rgba(194,59,34,0.1); animation: mic-pulse 1s infinite; }
    #input-area .mic-btn.unsupported { opacity: 0.3; filter: grayscale(1); }
    #input-area .mic-btn .hint-tip {
        display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
        transform: translateX(-50%); background: var(--parchment); color: var(--text-secondary);
        padding: 4px 10px; border-radius: 2px; font-size: 0.65rem;
        white-space: nowrap; pointer-events: none;
    }
    #input-area .mic-btn:hover .hint-tip { display: block; }
    @keyframes mic-pulse { 0%,100% { box-shadow: 0 0 0 rgba(194,59,34,0.3); } 50% { box-shadow: 0 0 10px rgba(194,59,34,0.5); } }
    @media (hover: none) and (pointer: coarse) {
        #input-area .mic-btn { width: 44px; height: 44px; min-width: 44px; font-size: 1.2rem; }
        #input-area .send-btn { width: 44px; height: 44px; font-size: 1rem; }
        #input-area input { font-size: 16px; padding: 12px 14px; }
        #input-area .mic-btn .hint-tip { display: none !important; }
    }

    /* 复习自评弹窗 */
    #review-dialog { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    #review-dialog.show { display: flex; }
    .dialog-box { background: var(--ink-light); border: 1px solid var(--parchment-light); border-radius: 4px; padding: 40px; max-width: 420px; width: 90%; text-align: center; animation: fadeIn 0.3s; }
    .dialog-box h3 { font-size: 1.1rem; letter-spacing: 3px; margin-bottom: 8px; }
    .dialog-box p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 24px; }
    .dialog-box .btn-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .dialog-box .btn-option { padding: 10px 24px; border-radius: 2px; border: 1px solid var(--parchment-light); background: transparent; color: var(--text-primary); font-family: inherit; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; }
    .btn-option.remembered { border-color: var(--gold); color: var(--gold); }
    .btn-option.remembered:hover { background: var(--gold); color: #000; }
    .btn-option.blurred { border-color: #8a7a5a; color: #8a7a5a; }
    .btn-option.blurred:hover { background: #8a7a5a; color: #000; }
    .btn-option.forgot { border-color: var(--vermillion); color: var(--vermillion); }
    .btn-option.forgot:hover { background: var(--vermillion); color: #fff; }

    /* 导航 */
    .nav-bar { display: flex; align-items: center; gap: 16px; padding: 10px 30px; background: var(--ink); border-bottom: 1px solid var(--parchment-light); flex-shrink: 0; }
    .nav-bar a { color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; cursor: pointer; transition: color 0.2s; }
    .nav-bar a:hover { color: var(--gold); }
    .nav-bar a.active { color: var(--vermillion); }
    .nav-bar .nav-spacer { flex: 1; }

    @media (max-width: 768px) {
        .portrait-panel { display: none; }
        .chat-panel { width: 100%; }
        .ph-card { width: 150px; padding: 20px 12px; }
        .msg { max-width: 92%; }
        .review-stats { flex-wrap: wrap; gap: 10px; }
    }
</style>
</head>
<body>

<!-- 登录 -->
<div id="login-page">
    <div class="logo">思</div>
    <h1>哲 思 书 斋</h1>
    <p class="subtitle">— 与先贤对话 · 温故而知新 —</p>
    <input id="api-key-input" type="password" placeholder="输入 DeepSeek API Key 以入室">
    <p class="hint">Key 仅保存在你的浏览器，不上传</p>
    <button class="btn" onclick="enter()">入 室</button>

</div>

<!-- 选择页 -->
<div id="select-page">
    <div class="nav-bar">
        <a class="active" onclick="showPage('select-page')">先哲</a>
        <a onclick="showReview()">📖 复习</a>
        <span class="nav-spacer"></span>
        <a onclick="switchUser()" style="color:#555;">切换Key</a>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:16px;">
        <button class="btn-small btn-gold" onclick="showReview()">📖 今日复习</button>
    </div>
    <div class="select-title">择 一 位 先 哲</div>
    <div class="select-subtitle">自由对话 · 与任何哲学家深入讨论</div>
    <div id="philosopher-list" class="philosopher-grid"></div>
</div>

<!-- 复习页 -->
<div id="review-page">
    <div class="nav-bar">
        <a onclick="showPage('select-page')">先哲</a>
        <a class="active">📖 复习</a>
        <span class="nav-spacer"></span>
        <a onclick="switchUser()" style="color:#555;">切换Key</a>
    </div>
    <div class="review-header">
        <div>
            <h2>📖 温故而知新</h2>
            <div class="sub">艾宾浩斯遗忘曲线 · 7阶段复习</div>
        </div>
        <button class="btn-small btn-gold" onclick="showPage('select-page')">← 返回</button>
    </div>
    <div class="review-stats" id="review-stats">
        <div class="stat-item"><div class="num" id="r-due">0</div><div class="label">今日到期</div></div>
        <div class="stat-item"><div class="num" id="r-total">0</div><div class="label">已学习</div></div>
        <div class="stat-item"><div class="num" id="r-mastered">0</div><div class="label">已掌握</div></div>
        <div class="stat-item"><div class="num" id="r-progress">0</div><div class="label">进行中</div></div>
    </div>
    <div class="review-list">
        <div class="review-list-title">⏳ 今日待复习</div>
        <div id="review-items"></div>
    </div>
</div>

<!-- 聊天 -->
<div id="chat-page">
    <div class="chat-layout">
        <div class="portrait-panel">
            <div class="portrait-frame" id="portrait-frame">
                <img id="portrait-img" src="" alt="" style="display:none;">
                <span class="ph-char" id="portrait-char" style="display:none;">仁</span>
            </div>
            <div class="portrait-name" id="portrait-name">孔子</div>
            <div class="portrait-title" id="portrait-title">孔丘</div>
            <div class="portrait-era" id="portrait-era">春秋</div>
            <div class="review-badge" id="review-badge" style="display:none;">📖 复习模式</div>
            <div class="deco-line"></div>
        </div>
        <div class="chat-panel">
            <div id="chat-header">
                <span class="back-btn" onclick="backToSelect()">←</span>
                <div class="ph-mini-info">
                    <span class="mini-char" id="chat-mini-char">仁</span>
                    <div>
                        <div class="mini-name" id="chat-mini-name">孔子</div>
                        <div class="mini-extra" id="chat-mini-extra">春秋</div>
                    </div>
                </div>
                <span class="mode-badge free" id="mode-badge">🗣 自由对话</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <label class="auto-speak-label"><input type="checkbox" id="auto-speak-toggle"> 朗读</label>
                    <span class="mode-badge free" style="font-size:0.6rem;">DeepSeek</span>
                </div>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <input id="msg-input" type="text" placeholder="写下你的问题…" onkeydown="if(event.key==='Enter') send()">
                <button class="mic-btn" id="mic-btn" onclick="toggleMic()" title="语音输入">🎤<span class="hint-tip">点击说话</span></button>
                <button class="send-btn" onclick="send()">答</button>
            </div>
        </div>
    </div>
</div>

<!-- 复习自评弹窗 -->

var EBBINGHAUS_STAGES = [1, 2, 4, 7, 15, 30, 90];

function getReviewState() {
    try { return JSON.parse(localStorage.getItem('zhexue_review_state')) || {}; }
    catch(e) { return {}; }
}
function saveReviewState(s) {
    localStorage.setItem('zhexue_review_state', JSON.stringify(s));
}

function initReviewState(phId) {
    var s = getReviewState();
    if (!s[phId]) {
        var ph = PHILOSOPHERS[phId];
        s[phId] = {
            name: ph ? ph.name : phId,
            stage: 0,
            last_reviewed: null,
            next_due: new Date().toISOString().split('T')[0],
            consecutive_remembered: 0,
            total_reviews: 0,
        };
        saveReviewState(s);
    }
    return s[phId];
}

function getReviewSummary() {
    var s = getReviewState();
    var total = 0, mastered = 0;
    var today = new Date().toISOString().split('T')[0];
    var dueCount = 0;

        total++;
        if (s[id].stage >= 7) { mastered++; }
        else if (s[id].next_due <= today) { dueCount++; }
    }
    return {
        total_philosophers: total,
        due_today: dueCount,
        mastered: mastered,
        in_progress: total - mastered,
        today: today,
    };
}

function getReviewDue() {
    var s = getReviewState();
    var today = new Date().toISOString().split('T')[0];
    var due = [];
    for (var id in s) {
        if (s[id].stage >= 7) continue;
        if (s[id].next_due <= today) {
            due.push({
                id: id,
                name: s[id].name,
                stage: s[id].stage || 0,
                total_reviews: s[id].total_reviews || 0,
                next_due: s[id].next_due,
            });
        }
    }
    due.sort(function(a, b) { return a.next_due < b.next_due ? -1 : 1; });
    return due;
}

function submitReviewResult(phId, result) {
    var s = getReviewState();
    if (!s[phId]) initReviewState(phId);
    var ps = s[phId];
    var curStage = ps.stage || 0;
    var newStage;
    if (result === 'remembered') {
        newStage = Math.min(curStage + 1, 7);
        ps.consecutive_remembered = (ps.consecutive_remembered || 0) + 1;
    } else if (result === 'forgot') {
        newStage = Math.max(curStage - 1, 0);
        ps.consecutive_remembered = 0;
    } else {
        newStage = curStage;
        ps.consecutive_remembered = 0;
    }
    var days = newStage >= 7 ? 365 : EBBINGHAUS_STAGES[newStage] || 365;
    var nextDate = new Date();
    nextDate.setDate(nextDate.getDate() + days);
    ps.stage = newStage;
    ps.last_reviewed = new Date().toISOString().split('T')[0];
    ps.next_due = nextDate.toISOString().split('T')[0];
    ps.total_reviews = (ps.total_reviews || 0) + 1;
    saveReviewState(s);
    return {
        stage: newStage,
        next_due: ps.next_due,
        mastered: newStage >= 7,
        total_reviews: ps.total_reviews,
    };
}

function showPage(id) {
    document.querySelectorAll('#login-page, #select-page, #review-page, #chat-page').forEach(function(p) {
        p.style.display = 'none';
    });
    document.getElementById(id).style.display = id === 'chat-page' ? '' : 'flex';
    if (id === 'select-page') loadPhilosophers();
    if (id === 'review-page') loadReviewDashboard();
}

function enter() {
    var key = document.getElementById('api-key-input').value.trim();
    if (!key) { alert('请输入 API Key'); return; }
    localStorage.setItem('deepseek_api_key', key);
    loadPhilosophers();
}

function switchUser() {
    localStorage.removeItem('deepseek_api_key');
    document.getElementById('login-page').style.display = 'flex';
    document.getElementById('select-page').style.display = 'none';
    document.getElementById('review-page').style.display = 'none';
    document.getElementById('chat-page').style.display = 'none';
    document.getElementById('api-key-input').value = '';
}

function backToSelect() {
    stopSpeaking();
    showPage('select-page');
    currentPhilosopher = null;
    messageHistory = [];
    isReviewMode = false;
    currentReviewPhId = null;
}

/* 加载哲学家列表 */
function loadPhilosophers() {
    var container = document.getElementById('philosopher-list');
    container.innerHTML = '';
    var sorted = Object.keys(PHILOSOPHERS).sort(function(a, b) {
        var co = {'中哲':0, '西哲':1, '马哲':2};
        var ca = co[PHILOSOPHERS[a].course] || 9;
        var cb = co[PHILOSOPHERS[b].course] || 9;
        return ca !== cb ? ca - cb : PHILOSOPHERS[a].name.localeCompare(PHILOSOPHERS[b].name, 'zh');
    });
    sorted.forEach(function(id) {
        var ph = PHILOSOPHERS[id];
        var card = document.createElement('div');
        card.className = 'ph-card';
        card.style.setProperty('--ph-color', ph.color || '#e94560');
        var badge = ph.course ? '<div class="course-badge ' + ph.course + '">' + ph.course + '</div>' : '';
        card.innerHTML = badge +
            '<div class="ph-char" style="color:' + ph.color + '">' + ph.emoji + '</div>' +
            '<div class="name">' + ph.name + '</div>' +
            '<div class="title">' + ph.title + '</div>' +
            '<div class="era">' + ph.era + '</div>';
        card.onclick = function() { startFreeChat(id); };
        container.appendChild(card);
    });
    showPage('select-page');
}

/* 自由对话 */
function startFreeChat(phId) {
    isReviewMode = false;
    currentReviewPhId = null;
    enterChat(phId, 'free');
}

/* 复习系统 */
function showReview() {
    showPage('review-page');
    loadReviewDashboard();
}

function loadReviewDashboard() {
    var s = getReviewSummary();
    document.getElementById('r-due').textContent = s.due_today;
    document.getElementById('r-total').textContent = s.total_philosophers;
    document.getElementById('r-mastered').textContent = s.mastered;
    document.getElementById('r-progress').textContent = s.in_progress;

    var due = getReviewDue();
    var c = document.getElementById('review-items');
    c.innerHTML = '';
    if (!due.length) {
        c.innerHTML = '<div class="review-empty"><div class="big">🎉</div>今日无待复习<br><span style="font-size:0.75rem;color:#555;">每次复习后自动加入艾宾浩斯计划</span></div>';
        return;
    }
    due.forEach(function(item) {
        var ph = PHILOSOPHERS[item.id];
        if (!ph) return;
        var dots = '';
        for (var i = 0; i < 7; i++) dots += '<div class="stage-dot' + (i < item.stage ? ' active' : '') + '"></div>';
        var d = document.createElement('div');
        d.className = 'review-item';
        d.innerHTML =
            '<div class="ri-icon" style="color:' + (ph.color || '#c9a96e') + '">' + ph.emoji + '</div>' +
            '<div class="ri-info"><div class="ri-name">' + item.name + '</div>' +
            '<div class="ri-meta">第' + (item.stage + 1) + '轮 · 已复习' + item.total_reviews + '次</div>' +
            '<div class="stage-bar">' + dots + '</div></div>' +
            '<button class="btn-small btn-gold" onclick="startReview('' + item.id + '')">开始复习</button>';
        c.appendChild(d);
    });
}

function startReview(phId) {
    isReviewMode = true;
    currentReviewPhId = phId;
    enterChat(phId, 'review');
}
/* API_REVIEW_END */

function enterChat(phId, mode) {
    currentPhilosopher = phId;
    var ph = PHILOSOPHERS[phId];
    if (!ph) return;

    var pi = document.getElementById('portrait-img');
    var pc = document.getElementById('portrait-char');
    var uri = PORTRAIT_URIS[phId];
    if (uri) { pi.src = uri; pi.style.display = 'block'; pc.style.display = 'none'; }
    else { pi.style.display = 'none'; pc.style.display = 'block'; pc.textContent = ph.emoji; }
    document.getElementById('portrait-name').textContent = ph.name;
    document.getElementById('portrait-title').textContent = ph.title;
    document.getElementById('portrait-era').textContent = ph.era;
    document.getElementById('portrait-frame').style.borderColor = ph.color || '#c9a96e';
    document.getElementById('chat-mini-char').textContent = ph.emoji;
    document.getElementById('chat-mini-name').textContent = ph.name;
    document.getElementById('chat-mini-extra').textContent = ph.era + ' · ' + (ph.title.split('·')[0] || '').trim();
    document.getElementById('chat-page').style.setProperty('--ph-color', ph.color || '#c9a96e');

    var modeBadge = document.getElementById('mode-badge');
    var reviewBadge = document.getElementById('review-badge');
    var container = document.getElementById('messages');

    if (mode === 'review') {
        modeBadge.textContent = '📖 复习模式';
        modeBadge.className = 'mode-badge review';
        reviewBadge.style.display = 'block';
        document.getElementById('review-dialog').dataset.phId = phId;
        document.getElementById('rd-title').textContent = '📖 复习完毕 · ' + ph.name;
        document.getElementById('rd-prompt').textContent = '你觉得自己对' + ph.name + '的核心内容掌握得怎么样？';

        var rp = ph.system_prompt + '\n\n【复习模式】\n帮学生复习关于你（' + ph.name + '）的核心思想。规则：\n1. 出核心命题让学生用自己的话解释\n2. 根据回答判断掌握程度\n3. 答得好追问更深的层次\n4. 答得模糊就帮他梳理但不直接给答案\n5. 3-5轮后学生自评\n6. 重要：不能直接照搬笔记原文问问题，要用自己的话问';
        messageHistory = [{ role: "system", content: rp }];
        var opening = "我们来复习关于我的核心内容。你先说说——你觉得我最重要的思想是什么？";
        messageHistory.push({ role: "assistant", content: opening });
        container.innerHTML = '<div class="msg system">═══ 复习模式 · ' + ph.name + ' ═══</div><div class="msg bot">' + escapeHtml(opening) + '</div>';
    } else {
        modeBadge.textContent = '🗣 自由对话';
        modeBadge.className = 'mode-badge free';
        reviewBadge.style.display = 'none';
        messageHistory = [
            { role: "system", content: ph.system_prompt },
            { role: "assistant", content: "在下" + ph.name + "。你有什么想问我的吗？" }
        ];
        container.innerHTML = '<div class="msg system">═══ 与 ' + ph.name + ' 对话 ═══</div><div class="msg bot">在下' + ph.name + '。你有什么想问我的吗？</div>';
    }
    document.getElementById('msg-input').value = '';
    document.getElementById('msg-input').focus();
    showPage('chat-page');
}

/* 复习结果 */
function showReviewDialog() { document.getElementById('review-dialog').classList.add('show'); }

function submitReview(result) {
    document.getElementById('review-dialog').classList.remove('show');
    var phId = document.getElementById('review-dialog').dataset.phId;
    if (!phId) return;
var data = submitReviewResult(phId, result);
    var c = document.getElementById('messages');
    var msg = result === 'remembered' ? ('✅ 记住了！第' + (data.stage+1) + '轮' + (data.stage>=7?' 🎉 已掌握！':'')) :
             result === 'forgot' ? ('❌ 忘了 · 回到第' + (data.stage+1) + '轮') :
             '🤔 有点模糊 · 保持第' + (data.stage+1) + '轮';
    c.insertAdjacentHTML('beforeend', '<div class="msg system">' + msg + '</div>');
    c.scrollTop = c.scrollHeight;
    setTimeout(function() { backToSelect(); }, 1500);
}

/* 发送消息 */
function send() {
    var input = document.getElementById('msg-input');
    var text = input.value.trim();
    if (!text || !currentPhilosopher) return;
    input.value = '';
    var container = document.getElementById('messages');
    container.insertAdjacentHTML('beforeend', '<div class="msg user">' + escapeHtml(text) + '</div>');
    container.scrollTop = container.scrollHeight;
    var typing = document.createElement('div');
    typing.className = 'typing-indicator';
    typing.innerHTML = '<span></span><span></span><span></span>';
    container.appendChild(typing);
    container.scrollTop = container.scrollHeight;
    messageHistory.push({ role: "user", content: text });

    fetch(DEEPSEEK_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_KEY() },
        body: JSON.stringify({ model: 'deepseek-chat', messages: messageHistory, temperature: 0.7, max_tokens: 1024 })
    }).then(function(r) { return r.json(); }).then(function(data) {
        typing.remove();
        if (data.error) {
            container.insertAdjacentHTML('beforeend', '<div class="error-msg">⚠️ ' + escapeHtml(data.error.message || JSON.stringify(data.error)) + '</div>');
            messageHistory.pop();
        } else {
            var reply = data.choices[0].message.content;
            messageHistory.push({ role: "assistant", content: reply });
            var md = document.createElement('div');
            md.className = 'msg bot';
            md.innerHTML = '<span class="msg-content">' + escapeHtml(reply) + '</span> <button class="speak-btn" title="朗读">🔊</button>';
            md.querySelector('.speak-btn').onclick = function() { speak(reply, this); };
            container.appendChild(md);
            if (document.getElementById('auto-speak-toggle').checked) speak(reply, md.querySelector('.speak-btn'));
            if (isReviewMode) {
                var bots = messageHistory.filter(function(m) { return m.role === 'assistant'; });
                if (bots.length >= 4) setTimeout(function() { showReviewDialog(); }, 1000);
            }
        }
        container.scrollTop = container.scrollHeight;
    }).catch(function(err) {
        typing.remove();
        container.insertAdjacentHTML('beforeend', '<div class="error-msg">⚠️ 网络错误：' + escapeHtml(err.message) + '</div>');
        messageHistory.pop();
        container.scrollTop = container.scrollHeight;
    });
}

/* 语音 */
var currentUtterance = null, currentSpeakBtn = null;
function speak(text, btn) {
    if (currentSpeakBtn === btn && speechSynthesis.speaking) {
        if (speechSynthesis.paused) { speechSynthesis.resume(); btn.classList.add('speaking'); }
        else { speechSynthesis.pause(); btn.classList.remove('speaking'); }
        return;
    }
    stopSpeaking();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 1.0;
    var voices = speechSynthesis.getVoices();
    var zv = voices.find(function(v) { return v.lang.includes('zh'); });
    if (zv) u.voice = zv;
    u.onstart = function() { if(btn)btn.classList.add('speaking'); document.getElementById('portrait-frame').classList.add('speaking'); };
    u.onend = u.onerror = function() { if(btn)btn.classList.remove('speaking'); document.getElementById('portrait-frame').classList.remove('speaking'); currentUtterance=null; currentSpeakBtn=null; };
    currentUtterance = u; currentSpeakBtn = btn;
    speechSynthesis.speak(u);
}
function stopSpeaking() {
    speechSynthesis.cancel();
    if (currentSpeakBtn) currentSpeakBtn.classList.remove('speaking');
    document.getElementById('portrait-frame').classList.remove('speaking');
    currentUtterance = null; currentSpeakBtn = null;
}
if (speechSynthesis) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged = function() { speechSynthesis.getVoices(); }; }

function escapeHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

/* 语音输入 */
var recognition = null;
var isRecording = false;
var micBtn = document.getElementById('mic-btn');

function initSpeechRecognition() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        if (micBtn) micBtn.classList.add('unsupported');
        micBtn.title = '浏览器不支持语音输入（请用 Chrome/Edge）';
        return;
    }
    recognition = new SR();
    recognition.lang = 'zh-CN';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onresult = function(event) {
        var transcript = '';
        for (var i = event.resultIndex; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                var input = document.getElementById('msg-input');
                input.value = transcript;
                input.focus();
                // 语音识别结束自动发送
                send();
            }
        }
    };
    recognition.onend = function() {
        isRecording = false;
        if (micBtn) micBtn.classList.remove('recording');
    };
    recognition.onerror = function(event) {
        isRecording = false;
        if (micBtn) micBtn.classList.remove('recording');
        if (event.error !== 'aborted' && event.error !== 'no-speech') {
            console.warn('语音识别错误:', event.error);
        }
    };
}

function toggleMic() {
    if (!recognition) {
        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { alert('你的浏览器不支持语音输入，请用 Chrome 或 Edge'); return; }
        initSpeechRecognition();
    }
    if (isRecording) {
        recognition.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
    } else {
        try {
            recognition.start();
            isRecording = true;
            micBtn.classList.add('recording');
        } catch(e) {
            // 防止重复start报错
            setTimeout(function() { toggleMic(); }, 300);
        }
    }
}

// 页面加载后初始化语音识别
initSpeechRecognition();

/* 启动 */
(function() {
    var saved = localStorage.getItem('deepseek_api_key');
    if (saved) { document.getElementById('api-key-input').value = saved; loadPhilosophers(); }
})();

</script>
